<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | MIUTM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0d6efd,#001f54);

            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;

        }

        .login-card{

            width:100%;
            max-width:430px;

            background:#fff;

            border-radius:20px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.25);

        }

        .logo{

            width:85px;
            height:85px;

            border-radius:50%;

            object-fit:cover;

            display:block;

            margin:auto;

            margin-bottom:20px;

        }

        h2{

            text-align:center;

            font-weight:700;

            color:#0d6efd;

            margin-bottom:5px;

        }

        .subtitle{

            text-align:center;

            color:#777;

            margin-bottom:30px;

        }

        .form-control{

            height:50px;

            border-radius:10px;

        }

        .btn-login{

            height:50px;

            border-radius:10px;

            font-weight:600;

        }

        .footer-text{

            text-align:center;

            margin-top:20px;

            color:#777;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-card">

    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

    <h2>MIUTM Admin</h2>

    <p class="subtitle">

        Student Management System

    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category,message in messages %}

                <div class="alert alert-{{ category }}">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input

            type="text"

            name="username"

            class="form-control"

            placeholder="Enter username"

            required>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Password

            </label>

            <input

            type="password"

            name="password"

            class="form-control"

            placeholder="Enter password"

            required>

        </div>

        <div class="d-grid">

            <button class="btn btn-primary btn-login">

                <i class="bi bi-box-arrow-in-right"></i>

                Login

            </button>

        </div>

    </form>

    <div class="footer-text">

        © 2026 MIUTM University

    </div>

</div>

</body>

</html>
